name: Build IPA From Git Source
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code Git
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: |
          # Installe les paquets de votre application (React/Next/Vue)
          npm install
          # Génère les fichiers de production (le dossier build ou out)
          npm run build --if-present

      - name: Setup Capacitor (No-Code iOS Wrapper)
        run: |
          # Installe l'outil qui transforme le web en application iOS native
          npm install @capacitor/core @capacitor/cli
          npx cap init AgriScan com.agriscan.app --web-dir=out
          npm install @capacitor/ios
          npx cap add ios

      - name: Sync Code to iOS
        run: |
          # Copie vos fichiers web directement dans le projet iOS
          npx cap sync ios

      - name: Build IPA File
        run: |
          cd ios/App
          # Compile le code en arrière-plan sans ouvrir Xcode
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
          
          # Création du fichier .ipa final
          mkdir Payload
          mv build/Release-iphoneos/App.app Payload/
          zip -r AgriScan.ipa Payload
          
      - name: Download your .IPA
        uses: actions/upload-artifact@v4
        with:
          name: AgriScan-iOS-App
          path: ios/App/AgriScan.ipa
